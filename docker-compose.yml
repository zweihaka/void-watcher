services:
    web:
        build: ./web
        ports:
            - "80:80"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/health"]
            interval: 30s
            timeout: 5s
            retries: 3
        depends_on:
            - app
    db:
        image: postgres:15-alpine
        env_file: .env
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASS}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - ./db/data:/var/lib/postgresql/data
            - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5
    app:
        build: ./app
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8000:8000"
        env_file: .env
        environment:
            DB_HOST: db
            DB_USER: ${DB_USER}
            DB_PASS: ${DB_PASS}
            DB_NAME: ${DB_NAME}
        restart: unless-stopped

    worker:
        build: ./app
        command: ["python", "-m", "src.worker"]
        depends_on:
            db:
                condition: service_healthy
        env_file: .env
        environment:
            DB_HOST: db
            DB_USER: ${DB_USER}
            DB_PASS: ${DB_PASS}
            DB_NAME: ${DB_NAME}
