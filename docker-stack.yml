services:

    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        configs:
            - source: prometheus.yml
              target: /etc/prometheus/prometheus.yml
        volumes:
            - prometheus_data:/prometheus
        networks:
            - app-network
        deploy:
            replicas: 1
            resources:
                limits:
                    memory: 256M

    grafana:
        image: grafana/grafana:latest
        ports:
            - "3000:3000"
        environment:
            GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
        secrets:
            - grafana_password
        volumes:
            - grafana_data:/var/lib/grafana
        networks:
            - app-network
        deploy:
            replicas: 1
            resources:
                limits:
                    memory: 256M

    node-exporter:
        image: prom/node-exporter:latest
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        networks:
            - app-network
        deploy:
            mode: global
            resources:
                limits:
                    memory: 64M

    cadvisor:
        image: gcr.io/cadvisor/cadvisor:latest
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
        networks:
            - app-network
        deploy:
            mode: global
            resources:
                limits:
                    memory: 128M

    web:
        image: ghcr.io/zweihaka/void-watcher-web:latest
        ports:
            - "80:80"
        networks:
            - app-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M

    db:
        image: postgres:15-alpine
        environment:
            POSTGRES_USER_FILE: /run/secrets/db_user
            POSTGRES_PASSWORD_FILE: /run/secrets/db_password
            POSTGRES_DB_FILE: /run/secrets/db_name
        secrets:
            - db_password
            - db_user
            - db_name
        volumes:
            - db_data:/var/lib/postgresql/data
        configs:
            - source: db_init
              target: /docker-entrypoint-initdb.d/init.sql
              mode: 0444
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user)"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    memory: 256M

    app:
        image: ghcr.io/zweihaka/void-watcher-app:latest
        networks:
            - app-network
        environment:
            DB_HOST: db
            DB_USER: /run/secrets/db_user
            DB_PASS: /run/secrets/db_password
            DB_NAME: /run/secrets/db_name
        secrets:
            - db_password
            - db_user
            - db_name
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M

    worker:
        image: ghcr.io/zweihaka/void-watcher-app:latest
        command: ["python", "-m", "src.worker"]
        networks:
            - app-network
        environment:
            DB_HOST: db
            DB_USER: /run/secrets/db_user
            DB_PASS: /run/secrets/db_password
            DB_NAME: /run/secrets/db_name
        secrets:
            - db_password
            - db_user
            - db_name
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M

networks:
    app-network:
        external: true

volumes:
    db_data:
        driver: local
    prometheus_data:
        driver: local
    grafana_data:
        driver: local

configs:
    prometheus.yml:
        file: ./monitoring/prometheus.yml

    db_init:
        file: ./db/init.sql

secrets:
    db_password:
        file: ./secrets/db_password.txt
    db_user:
        file: ./secrets/db_user.txt
    db_name:
        file: ./secrets/db_name.txt
    grafana_password:
        file: ./secrets/grafana_password.txt
