services:
    web:
        image: void-watcher-web:latest
        ports:
            - "80:80"
        networks:
            - app-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M

    db:
        image: postgres:15-alpine
        environment:
            POSTGRES_USER_FILE: /run/secrets/db_user
            POSTGRES_PASSWORD_FILE: /run/secrets/db_password
            POSTGRES_DB_FILE: /run/secrets/db_name
        secrets:
            - db_password
            - db_user
            - db_name
        volumes:
            - db_data:/var/lib/postgresql/data
        configs:
            - source: db_init
              target: /docker-entrypoint-initdb.d/init.sql
              mode: 0444
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db_user)"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    memory: 256M

    app:
        image: void-watcher-app:latest
        networks:
            - app-network
        environment:
            DB_HOST: db
            DB_USER: /run/secrets/db_user
            DB_PASS: /run/secrets/db_password
            DB_NAME: /run/secrets/db_name
        secrets:
            - db_password
            - db_user
            - db_name
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            update_config:
                parallelism: 1
                delay: 10s
                failure_action: rollback
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M

    worker:
        image: void-watcher-app:latest
        command: ["python", "-m", "src.worker"]
        networks:
            - app-network
        environment:
            DB_HOST: db
            DB_USER: /run/secrets/db_user
            DB_PASS: /run/secrets/db_password
            DB_NAME: /run/secrets/db_name
        secrets:
            - db_password
            - db_user
            - db_name
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s
                max_attempts: 3
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M

networks:
    app-network:
        external: true

volumes:
    db_data:
        driver: local

configs:
    db_init:
        file: ./db/init.sql

secrets:
    db_password:
        file: ./secrets/db_password.txt
    db_user:
        file: ./secrets/db_user.txt
    db_name:
        file: ./secrets/db_name.txt
